<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PhyloFace</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>
  
<div id="topBar">

  <img
    src="assets/logo.png"
    id="logo"
  >

  <div id="titleBlock">

    <h1>PHYLOFACE</h1>

    <p>
      Comparative Evolutionary
      Morphology Engine
    </p>

  </div>

</div>
  
<div class="container">

  <h1>PHYLOFACE</h1>

  <p class="subtitle">
    Discover your evolutionary equivalent
  </p>

  <video id="video" autoplay playsinline></video>

  <canvas id="canvas"></canvas>

  <button id="analyzeBtn">
    Analyze My Face
  </button>

  <div id="loading" class="hidden">

    <div class="scanner"></div>

    <h2>ANALYZING</h2>

    <div id="progressBarContainer">

      <div id="progressBar"></div>

    </div>

    <p id="progressText">0%</p>

    <p id="loadingText">
      Initializing...
    </p>

    <div id="metricsLive"></div>

  </div>

  <div id="result" class="hidden">

    <h2 id="animalName"></h2>

    <img id="animalImage">

    <p id="animalDescription"></p>

    <p id="score"></p>

  </div>

</div>

<script src="animals.js"></script>
<script src="app.js"></script>

</body>
</html>

<button onclick="window.print()">
  Save Result
</button>

<div id="videoContainer">

  <video
    id="video"
    autoplay
    playsinline>
  </video>

  <canvas id="canvas"></canvas>

  <div id="scanLine"></div>

  <div id="hud">

    <div class="hudCorner topLeft"></div>
    <div class="hudCorner topRight"></div>
    <div class="hudCorner bottomLeft"></div>
    <div class="hudCorner bottomRight"></div>

  </div>

</div>

<div id="statusPanel">

  <p>FACE DETECTED</p>
  <p>LANDMARKS: 468</p>
  <p>AI STATUS: ACTIVE</p>

</div>
